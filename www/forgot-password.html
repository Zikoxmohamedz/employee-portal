<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نسيت كلمة المرور - بوابة الموظفين</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="navbar">
    <div class="brand">بوابة الموظفين</div>
    <div class="nav-actions">
      <a href="login.html" class="nav-btn primary">رجوع للدخول</a>
    </div>
  </div>

  <div class="container">
    <div class="hero">
      <h1>إعادة تعيين كلمة المرور</h1>
      <p>أدخل بياناتك للتحقق من هويتك وتعيين كلمة مرور جديدة.</p>
    </div>

    <div class="card" style="max-width: 550px; margin: 0 auto;">
      <div class="grid">
        <div class="input-group full">
          <label>كود الموظف</label>
          <input type="text" id="employeeCode" placeholder="مثلاً: 101" />
        </div>

        <div class="input-group full">
          <label>الرقم القومي</label>
          <input type="text" id="nationalId" placeholder="14 رقم" />
        </div>

        <div class="input-group full">
          <label>كلمة المرور الجديدة</label>
          <input type="password" id="newPassword" placeholder="••••••••" />
        </div>
      </div>

      <button class="btn btn-primary mt-4" id="resetBtn">تحديث كلمة المرور</button>
      <p class="msg text-center" id="resetStatus"></p>
    </div>
  </div>

  <script type="module" src="forgot-password.js"></script>
</body>
</html>
