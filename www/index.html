<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>تسجيل الدخول</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://hlttntxvhwspllrbavwh.supabase.co https://ui-avatars.com; connect-src 'self' https://hlttntxvhwspllrbavwh.supabase.co https://cdn.jsdelivr.net;">
</head>
<body>
  <div class="page">
    <div class="hero">
      <h1>تسجيل الدخول</h1>
      <p>ادخل بالإيميل والباسورد. لو فتحت الحساب من جهاز جديد، الجلسات الأخرى هتتقفل.</p>
    </div>

    <div class="card" style="max-width: 500px; margin: 0 auto;">
      <div class="grid">
        <div class="input-group full">
          <label>كود الموظف</label>
          <input type="text" id="employeeCode" placeholder="مثلاً: 123" />
        </div>

        <div class="input-group full">
          <label>كلمة المرور</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>
      </div>

      <button class="btn btn-primary mt-4" id="loginBtn">دخول</button>
      <p class="msg text-center" id="loginStatus"></p>
      <div class="text-center mt-4" style="display: flex; flex-direction: column; gap: 0.5rem;">
        <p class="text-muted">ليس لديك حساب؟ <a href="signup.html">إنشاء حساب جديد</a></p>
        <p><a href="forgot-password.html" style="font-size: 0.9rem; color: var(--primary);">نسيت كلمة المرور؟</a></p>
      </div>
    </div>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
